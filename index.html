<!DOCTYPE HTML>

<html>
	<head>
		<title>Creality Halot Remote Control</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js" integrity="sha512-g2TeAWw5GPnX7z0Kn8nFbYfeHcvAu/tx6d6mrLe/90mkCxO+RcptyYpksUz35EO337F83bZwcmUyHiHamspkfg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.js" integrity="sha512-NQVmLzNy4Lr5QTrmXvq/WzTMUnRHmv7nyIT/M6LyGPBS+TIeRxZ+YQaqWxjpRpvRMQSuYPQURZz/+pLi81xXeA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
		<style>
			:root {
				--bg: #ffffff;
				--fg: #1a1a1a;
				--panel-bg: #f5f5f5;
				--border: #cccccc;
				--hover-bg: #eef4ff;
				--loaded-bg: #a0ffa0;
				--loaded-hover-bg: #8ef08e;
				--link: #0645ad;
				--muted: #666666;
			}

			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #1a1a1a;
					--fg: #e8e8e8;
					--panel-bg: #262626;
					--border: #444444;
					--hover-bg: #2d3a4a;
					--loaded-bg: #1f5c1f;
					--loaded-hover-bg: #276b27;
					--link: #6ea8fe;
					--muted: #999999;
				}
			}

			body {
				font-family: sans-serif;
				margin: 20px;
				background: var(--bg);
				color: var(--fg);
			}

			a { color: var(--link); }

			.main-layout { display: flex; gap: 30px; align-items: flex-start; flex-wrap: wrap; }
			.left-column { flex: 1; min-width: 350px; }
			.right-column { flex: 0 0 auto; width: 480px; }

			.panel {
				border: 2px solid var(--border);
				border-radius: 8px;
				padding: 10px;
				background: var(--panel-bg);
				margin-bottom: 16px;
			}

			.preview-box img,
			.camera-box img {
				max-width: 100%;
				width: 100%;
				border-radius: 4px;
				display: block;
				background: #000;
			}

			.camera-box img {
				cursor: pointer;
			}

			.lightbox-overlay {
				display: none;
				position: fixed;
				top: 0; left: 0;
				width: 100%; height: 100%;
				background: rgba(0, 0, 0, 0.9);
				z-index: 1000;
				align-items: center;
				justify-content: center;
				cursor: pointer;
			}
			.lightbox-overlay.active { display: flex; }
			.lightbox-overlay img {
				max-width: 95%;
				max-height: 95%;
				border-radius: 4px;
			}

			.preview-filename {
				font-weight: bold;
				font-size: 14px;
				margin-bottom: 8px;
				word-break: break-word;
				min-height: 1.4em;
			}

			.preview-placeholder {
				display: flex;
				align-items: center;
				justify-content: center;
				aspect-ratio: 1 / 1;
				background: #000;
				border-radius: 4px;
				color: var(--muted);
				font-size: 13px;
				text-align: center;
				padding: 10px;
			}

			input[type=submit] {
				cursor: pointer;
				background: var(--panel-bg);
				color: var(--fg);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 6px 10px;
			}
			input[type=text] {
				background: var(--bg);
				color: var(--fg);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 4px 6px;
			}

			.file-list {
				max-height: 400px;
				overflow-y: auto;
				border: 1px solid var(--border);
				border-radius: 6px;
				margin-top: 8px;
			}
			.file-item {
				padding: 8px 12px;
				cursor: pointer;
				border-bottom: 1px solid var(--border);
				font-size: 14px;
			}
			.file-item:last-child { border-bottom: none; }
			.file-item:hover { background: var(--hover-bg); }
			.file-item.loaded {
				background: var(--loaded-bg);
				font-weight: bold;
			}
			.file-item.loaded:hover { background: var(--loaded-hover-bg); }

			#log { color: var(--muted); }
		</style>
   	</head>
   
   	<body onload="onPageLoad()">
	<div class="lightbox-overlay" id="lightboxOverlay" onclick="closeLightbox()">
		<img id="lightboxImg">
	</div>
	<div class="main-layout">
		<div class="left-column">
			<div id = "sse">
				URL: <input type=text value="" id="url">
				password: <input type=text value="0" id="password">
				<input type=submit value="Connect" onClick="javascript:connect()">
				<input type=submit value="Disconnect" onClick="javascript:disconnect()">
			</div><br>
			<div id = "fileCmds">
				File upload: <input type="file" id="inputFile" />
				<input type=submit value="Upload" onClick="javascript:uploadFile()">
			</div><br>
			<div id = "usbFiles">
					<b>USB Drive Files:</b>
					<input type=submit value="Refresh List" onClick="javascript:loadUsbFiles()">
					<div id="usbFileList" class="file-list"></div>
			</div><br>
			<div id = "cmds">
				<input type=submit value="Print" onClick="javascript:startPrint()">
				<input type=submit value="Pause" onClick="javascript:sendCmd('PRINT_PAUSE')">
				<input type=submit value="Stop" onClick="javascript:stopPrint()">
			    <input type=submit value="Reboot Printer" onClick="javascript:rebootPrinter()" style="margin-left: 20px; color: #c0392b;">
			</div><br>
			
			<div id = "fileStatus"></div><br>
			<div id = "status"></div><br>
			<div id = "log" style="font-size:11px;"></div>
		</div>

		<div class="right-column">
			<div class="panel preview-box">
				<div class="preview-filename" id="previewFilename"></div>
				<div id="previewContainer">
					<div class="preview-placeholder" id="previewPlaceholder">No file loaded</div>
					<img id="previewThumbnail" style="display:none;">
				</div>
			</div>

			<div class="panel camera-box">
				<b>Camera Feed</b><br>
				<img id="cameraFeed" onclick="openLightbox()">
			</div>
		</div>
	</div>
		<br>
		Fork by <a href="https://github.com/DarmokNoob/creality-remote-control">DarmokNoob</a> — originally forked from <a href="https://github.com/danielkucera/creality-remote-control">danielkucera/creality-remote-control</a><br>
		<script type = "text/javascript">
			var stat;
			var statusTimer;
			var file;
			var token;
			var lastPrintStatus = null;
	
			document.getElementById('inputFile').addEventListener('change', function(e) {
				  file = document.getElementById('inputFile').files[0];
			});
	
			function log(text){
				line = (new Date().toLocaleTimeString()) + " " + text + "<br>\n";
				document.getElementById('log').innerHTML = line + document.getElementById('log').innerHTML;
			}

			function passToToken(password){
				// from: https://github.com/tarequeh/DES/blob/master/run_des.c#L136

				var key = CryptoJS.enc.Hex.parse("6138356539643638");

				var encrypted = CryptoJS.DES.encrypt(password, key, {
					mode: CryptoJS.mode.ECB,
					padding: CryptoJS.pad.Pkcs7
				});

				var finalEncrypted = CryptoJS.enc.Base64.stringify(encrypted.ciphertext);

				return finalEncrypted;
			}
		
			function printStatus(stat){
				lastPrintStatus = stat.printStatus;

				code = "";
				code += "Status: " + stat.printStatus + "<br>\n";
				code += "Filename: " + stat.filename + "<br>\n";
				code += "Time left: " + new Date(stat.printRemainTime*1000).toISOString().substring(11, 19) + "<br>\n";
				code += "Progress: " + Math.round((stat.curSliceLayer/stat.sliceLayerCount)*1000)/10 + "%<br>\n";
				code += "Current layer: " + stat.curSliceLayer + "<br>\n";
				code += "Total layers: " + stat.sliceLayerCount + "<br>\n";
				code += "Print exposure: " + stat.printExposure + "s<br>\n";
				code += "Layer thickness: " + stat.layerThickness + "mm<br>\n";
				code += "Rising height: " + stat.printHeight + "mm<br>\n";
				code += "Bottom layers: " + stat.bottomExposureNum + "<br>\n";
				code += "Initial exposure: " + stat.initExposure + "s<br>\n";
				code += "Turn off delay: " + stat.delayLight + "s<br>\n";
				code += "Motor speed: " + stat.eleSpeed + "mm/s<br>\n";
				code += "Exposure time: " + stat.delayLight + "s<br>\n";
				code += "Resin: " + stat.resin + "<br>\n";

				document.getElementById('status').innerHTML = code;
			}

			function printFileStatus(stat){
				code = "";
				code += "Sent: " + stat.received/(1024*1024) + " MB<br>\n";
				code += "Size: " + stat.size/(1024*1024) + " MB<br>\n";
				code += "Progress: " + Math.round((stat.received/stat.size)*100) + "%<br>\n";
				code += "Checked: " + (stat.checkstate ? "OK" : "ERROR") + "<br>\n";

				document.getElementById('fileStatus').innerHTML = code;
			}

			function sendCmd(cmd, extras = {}){

				if (!ws || ws.readyState != 1){
					alert("Not connected, please connect first.");
					return;
				}

				msg = {
					cmd: cmd,
					token: token,
					...extras,
				};
				jmsg = JSON.stringify(msg);
				log("> " + jmsg);
				ws.send(jmsg);

			}
	
			function getStatus(){
				sendCmd("GET_PRINT_STATUS");
			}

			function uploadFile(){
				if (!file) {
					alert("Please choose a file first.");
					return;
				}

				extras = {
					filename: file.name,
					offset: "0", // why string?
					size: file.size.toString(), // why?
				}
				sendCmd("START_FILE", extras);
			}

			function startPrint(){
				if (confirm("Are you sure you want to start new print?") == true){
					sendCmd("START_PRINT", {filename: file.name});
				}
			}

			function stopPrint(){
				if (confirm("Are you sure you want to stop the print?") == true){
					sendCmd('PRINT_STOP');
				}
			}
		
			function disconnect(){
				log("Disconnecting...");	
				ws.close();
			}

			var readEventHandler = function(evt) {
				if (evt.target.error == null) {
					data = evt.target.result;

					console.log(data);
					
					zdata = pako.deflate(data);

					len = new Uint8Array(4);
					len[0] = (data.byteLength >> 24) & 0xff;
					len[1] = (data.byteLength >> 16) & 0xff;
					len[2] = (data.byteLength >> 8) & 0xff;
					len[3] = (data.byteLength >> 0) & 0xff;

					var blob = new Blob([len, zdata]);

					console.log(blob);
					ws.send(blob);

				} else {
					console.log("Read error: " + evt.target.error);
					return;
				}
			}

			function sendChunk(offset){
				dataSlice = file.slice(offset, offset + 0x10000);

				reader = new FileReader();

				reader.onload = readEventHandler;

				reader.readAsArrayBuffer(dataSlice);
			}
	
			 function connect(){
				log("Connecting...")
				if ("WebSocket" in window) {
					url = document.getElementById('url').value;
					password = document.getElementById('password').value;
					token = passToToken(password);

					window.location.hash = "url="+url+"&password="+password;

				    // Let us open a web socket
				    ws = new WebSocket(url);
					
				   	ws.onopen = function() {
						log("Connected.");
					  
						getStatus();
			  
						statusTimer = setInterval(getStatus, 5000);
					};
					
				    ws.onmessage = function (evt) { 
						var received_msg = evt.data;
						msg = JSON.parse(evt.data);
	
						cmd = msg.cmd;
						
						if (cmd == "GET_PRINT_STATUS") {
							printStatus(msg);

						} else if (cmd == "START_FILE") {
							offset = parseInt(msg.offset)
							sendChunk(offset);

						} else if (cmd == "START_DATA") {
							offset = parseInt(msg.received)
							printFileStatus(msg);
							sendChunk(offset);

						} else if (cmd == "CHECK_DATA") {
							printFileStatus(msg);
						}

						log("< " + received_msg);
					};
					
					ws.onclose = function() { 
						clearInterval(statusTimer);
						log("Connection is closed..."); 
					};
	
				} else {
					log("WebSocket NOT supported by your Browser!");
				}
			}

			function updateParamsFromHash(){
				params = new URLSearchParams(location.hash.substring(1));

				if(params.has("url")){
					document.getElementById('url').value = params.get("url");
				}

				if(params.has("password")){
					document.getElementById('password').value = params.get("password");
				}
			}

			function onPageLoad(){
				console.log(window.location.hash);

				// Build camera and default WebSocket URLs from whatever host actually
				// served this page, rather than hardcoding an IP or using "localhost"
				// (which in a browser always means the viewer's own machine, not the printer).
				var host = window.location.hostname;
				document.getElementById('cameraFeed').src = 'http://' + host + ':8081/?action=stream';
				document.getElementById('url').value = 'ws://' + host + ':18188/';

				if ("onhashchange" in window) // does the browser support the hashchange event?
				window.onhashchange = function () {
					updateParamsFromHash();
				}

				updateParamsFromHash();
				loadUsbFiles();
			}

			function showPreview(filename){
				var nameDiv = document.getElementById('previewFilename');
				var placeholder = document.getElementById('previewPlaceholder');
				var img = document.getElementById('previewThumbnail');

				if (!filename) {
					nameDiv.textContent = '';
					placeholder.style.display = 'flex';
					placeholder.textContent = 'No file loaded';
					img.style.display = 'none';
					return;
				}

				nameDiv.textContent = filename;
				// Cache-bust so switching files always shows the right thumbnail
				img.src = '/api/thumbnail?filename=' + encodeURIComponent(filename) + '&t=' + Date.now();
				img.onload = function(){
					placeholder.style.display = 'none';
					img.style.display = 'block';
				};
				img.onerror = function(){
					placeholder.style.display = 'flex';
					placeholder.textContent = 'Preview unavailable for this file';
					img.style.display = 'none';
				};
			}
			
			function loadUsbFiles(){
            	Promise.all([
					fetch('/api/usb-files').then(r => r.json()),
					fetch('/api/udisk-files').then(r => r.json())
					])
					.then(([usbFiles, udiskFiles]) => {
					var listDiv = document.getElementById('usbFileList');
					listDiv.innerHTML = '';
					usbFiles.forEach(function(name){
						var loaded = udiskFiles.includes(name);
						var item = document.createElement('div');
						item.className = 'file-item' + (loaded ? ' loaded' : '');
						item.textContent = (loaded ? "\u2705 " : "") + name;
						item.onclick = function(){ loadFileToQueue(name); };
						listDiv.appendChild(item);
					});

					if (udiskFiles.length > 0) {
						// Keep the global 'file' reference in sync with whatever's
						// actually loaded on the printer, even on a fresh page load
						// where no click has happened yet - otherwise Print silently
						// does nothing because file.name is undefined.
						file = {name: udiskFiles[0]};
						showPreview(udiskFiles[0]);
					} else {
						file = null;
						showPreview(null);
					}
				});
			}

			function loadFileToQueue(name){
				if (lastPrintStatus === "PRINT_PROCESSING" || lastPrintStatus === "PRINT_PAUSE") {
					alert("Cannot load a new file while a print is active (" + lastPrintStatus + ").\n\nStop the current print first.");
					return;
				}

				if (!confirm("Load '" + name + "' from USB into the printer's queue?\n\nThis will replace any file currently loaded.")) return;
        		fetch('/api/load-file', {
                	method: 'POST',
                	headers: {'Content-Type': 'application/json'},
                	body: JSON.stringify({filename: name})
        		})
        		.then(r => r.json())
        		.then(result => {
				if (result.error) {
					alert("Error: " + result.error);
                } else {
					file = {name: result.filename};
					alert("Loaded: " + result.filename + "\nReady to print.");
					loadUsbFiles();
                	}
        		});
			}
			
			function openLightbox(){
				document.getElementById('lightboxImg').src = document.getElementById('cameraFeed').src;
				document.getElementById('lightboxOverlay').classList.add('active');
			}

			function closeLightbox(){
				document.getElementById('lightboxOverlay').classList.remove('active');
			}

			function rebootPrinter(){
				if (lastPrintStatus === "PRINT_PROCESSING" || lastPrintStatus === "PRINT_PAUSE") {
					alert("Cannot reboot while a print is active (" + lastPrintStatus + ").\n\nStop the current print first.");
					return;
				}

				if (!confirm("Reboot the printer?\n\nThis will restart the touchscreen, camera feed, and this web UI. Useful for clearing a stuck PRINT_END state remotely.\n\nThe page will be unreachable for about a minute while it boots.")) return;

				fetch('/api/reboot', { method: 'POST' })
					.then(r => r.json())
					.then(result => {
						alert("Reboot triggered. Give it about a minute, then reload this page.");
					})
					.catch(err => {
						alert("Reboot triggered (connection dropped as expected).");
					});
			}
		</script>
   	</body>
</html>
